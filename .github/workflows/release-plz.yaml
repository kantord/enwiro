name: Release-plz

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'kantord' }}
    permissions:
      contents: write
    concurrency:
      group: release-plz-release
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Create git tags and GitHub releases
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      # Build the enwiro-gui frontend so the publish step below packages real
      # assets: web/dist is gitignored but listed in enwiro-gui's Cargo.toml
      # `include`, so whatever this build produces is what ships in the
      # crates.io tarball.
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Build enwiro-gui frontend
        run: pnpm --filter ./enwiro-gui/web build
      # Publish crates individually, skipping ones already on crates.io.
      # This works around release-plz's gix slotmap overflow during index
      # polling (GitoxideLabs/gitoxide#1788).
      # Iteration order is a topological sort over intra-workspace deps so a
      # crate is always published after the workspace crates it depends on.
      # NOTE: If publish ordering breaks again (e.g. new kinds of workspace
      # cross-deps, or the tsort pipeline misbehaving), this step is the lever
      # to update — make sure dependents are still ordered after their deps.
      - name: Publish to crates.io
        run: |
          set -o pipefail
          order=$(cargo metadata --format-version 1 | jq -r '
            . as $m
            | [$m.workspace_members[] | . as $id | $m.packages[] | select(.id == $id) | .name] as $ws
            | $m.packages[]
            | select(.name as $n | $ws | index($n))
            | select(.publish != [])
            | . as $p
            | "\($p.name) \($p.name)",
              (.dependencies[] | select(.name as $d | $ws | index($d)) | "\(.name) \($p.name)")
          ' | tsort)
          for pkg in $order; do
            echo "Publishing $pkg..."
            # enwiro-gui's tarball includes the freshly built (gitignored)
            # web/dist, which cargo's VCS dirty-check would otherwise reject.
            flags=""
            if [ "$pkg" = "enwiro-gui" ]; then
              flags="--allow-dirty"
            fi
            if cargo publish -p "$pkg" $flags 2>&1 | tee /tmp/publish.log; then
              continue
            fi
            if grep -q 'already exists on crates.io' /tmp/publish.log; then
              echo "$pkg already published, skipping."
            else
              echo "$pkg failed to publish."
              exit 1
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    needs:
      - release-plz-release
    if: ${{ github.repository_owner == 'kantord' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
